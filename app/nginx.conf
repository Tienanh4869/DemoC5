server {
    listen 8080;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ =404;
    }

    # Healthcheck endpoint cho Kubernetes liveness/readiness probe
    location /healthz {
        access_log off;
        return 200 "healthy\n";
    }
}
